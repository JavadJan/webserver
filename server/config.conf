server 
{
    listen 127.0.0.1:4243;
    
    error_page ./tmp/www/error.html;
    max_body_size 2097152; # 2 mb => bytes ? -> 1024kb * 1024byte * 2==  
    max_body_size 4;

    # Define a root for the static website
    location /
	{
        allow_methods GET;
        root ./tmp/www;
        index index.html;
		autoindex on;
    }

    # Define a route for the Doxygen documentation
    location /test
    {
        allow_methods GET POST DELETE;
        root ./tmp/www;
        index index.html;
        autoindex on;
        allow_upload on;
    }
}

server
{
    listen 127.0.0.1:4244;
    max_body_size 2097152; # 2 mb
    error_page ./tmp/www/error.html;

    # Define a route for CGI testing
    location /
    {
        allow_methods GET POST;
        root ./tmp/www;
        autoindex on;
        cgi .py /usr/bin/python3;
        cgi .php /usr/bin/php-cgi;
        cgi .sh /bin/bash;
		
    }
	location /upload
	{
		methods GET POST;
		root ./tmp/www;
		allow_upload on;
	}
}

server
{
    listen 127.0.0.1:4245;
    max_body_size 536870912; # 512 MiB
	error_page ./tmp/www/error.html;
	
    # Define a route for upload and DELETE request testing
    location /
    {
        allow_methods GET POST DELETE;
        root ./tmp/www;
        autoindex on;
        allow_upload on;
    }

	location /upload
	{
		methods GET POST;
		root ./tmp/www;
		allow_upload on;
	}
}